<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | The Safety Layer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy:    #0a1f35;
            --blue:    #1a4a7a;
            --sky:     #2d7dd2;
            --accent:  #f0a500;
            --success: #27ae60;
            --danger:  #e74c3c;
            --light:   #f4f7fb;
            --border:  #dce4ef;
            --text:    #1a2a3a;
            --muted:   #6b7f96;
            --white:   #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Barlow', sans-serif;
            background: var(--light);
            min-height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 2rem 1rem;
        }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 60%, #1a6a9a 100%);
            z-index: -1;
        }
        .card {
            background: var(--white);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%; max-width: 420px;
            overflow: hidden;
        }
        .card-header {
            background: linear-gradient(135deg, var(--navy), var(--blue));
            padding: 2rem;
            text-align: center;
        }
        .brand {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.3rem; font-weight: 700;
            color: rgba(255,255,255,0.6);
            letter-spacing: 3px; margin-bottom: 0.3rem;
        }
        .brand span { color: var(--accent); }
        .card-header h1 {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.6rem; font-weight: 700;
            color: var(--white); letter-spacing: 1px;
        }
        .card-header p { color: rgba(255,255,255,0.6); font-size: 0.85rem; margin-top: 0.3rem; }
        .tabs {
            display: grid; grid-template-columns: 1fr 1fr;
            border-bottom: 1px solid var(--border);
        }
        .tab-btn {
            padding: 0.9rem; border: none; background: transparent;
            font-family: 'Barlow', sans-serif; font-size: 0.9rem;
            font-weight: 600; color: var(--muted); cursor: pointer;
            border-bottom: 3px solid transparent; transition: all 0.15s;
        }
        .tab-btn.active { color: var(--sky); border-bottom-color: var(--sky); }
        .panel { padding: 1.8rem; display: none; }
        .panel.active { display: block; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label {
            display: block; font-size: 0.82rem; font-weight: 600;
            color: var(--muted); text-transform: uppercase;
            letter-spacing: 0.5px; margin-bottom: 0.4rem;
        }
        .form-group input {
            width: 100%; padding: 0.75rem 1rem;
            border: 2px solid var(--border); border-radius: 8px;
            font-family: 'Barlow', sans-serif; font-size: 0.95rem;
            color: var(--text); transition: border-color 0.15s;
        }
        .form-group input:focus { outline: none; border-color: var(--sky); }
        .btn {
            width: 100%; padding: 0.85rem;
            background: linear-gradient(135deg, var(--sky), var(--navy));
            color: var(--white); border: none; border-radius: 8px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.1rem; font-weight: 700; letter-spacing: 1px;
            cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 4px 15px rgba(45,125,210,0.3);
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(45,125,210,0.4); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .status-msg {
            margin-top: 1rem; padding: 0.8rem 1rem;
            border-radius: 8px; font-size: 0.88rem; display: none;
        }
        .status-msg.error   { background: #fdf0ef; color: var(--danger); border: 1px solid #f5c6c3; display: block; }
        .status-msg.success { background: #eafaf1; color: var(--success); border: 1px solid #a9dfbf; display: block; }
        .divider {
            display: flex; align-items: center; gap: 0.8rem;
            margin: 1.2rem 0; color: var(--muted); font-size: 0.8rem;
        }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
        .card-footer {
            padding: 1rem 1.8rem; background: var(--light);
            border-top: 1px solid var(--border);
            text-align: center; font-size: 0.8rem; color: var(--muted);
        }
        .card-footer a { color: var(--sky); text-decoration: none; }
        .powered { text-align: center; margin-top: 1.5rem; font-size: 0.78rem; color: rgba(255,255,255,0.5); }
        .powered a { color: rgba(255,255,255,0.7); text-decoration: none; }
        .powered strong { color: var(--accent); }
    </style>
</head>
<body>

<div class="card">
    <div class="card-header">
        <div class="brand">THE <span>SAFETY</span> LAYER</div>
        <h1>Safety Manager Portal</h1>
        <p>Sign in to view your airline's SMS dashboard</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('login')">Sign In</button>
        <button class="tab-btn" onclick="showTab('register')">Register</button>
    </div>

    <!-- LOGIN PANEL -->
    <div class="panel active" id="loginPanel">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="loginEmail" placeholder="you@airline.com" autocomplete="email">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn" id="loginBtn" onclick="handleLogin()">SIGN IN →</button>
        <div class="status-msg" id="loginStatus"></div>

        <div class="divider">or</div>

        <button class="btn" style="background: linear-gradient(135deg, #555, #222);" onclick="handleMagicLink()">
            ✉️ SEND MAGIC LINK
        </button>
        <p style="text-align:center; font-size:0.78rem; color:var(--muted); margin-top:0.6rem;">
            Passwordless — we email you a one-click sign-in link
        </p>
    </div>

    <!-- REGISTER PANEL -->
    <div class="panel" id="registerPanel">
        <div style="background:#fff8e1; border:1px solid #ffe082; border-radius:8px; padding:0.8rem 1rem; margin-bottom:1.2rem; font-size:0.85rem; color:#856404;">
            🔑 Registration requires an <strong>invite code</strong> from The Safety Layer.
            <a href="mailto:hello@gsacharya.com" style="color:var(--sky);">Request access →</a>
        </div>
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="regName" placeholder="Your full name">
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="regEmail" placeholder="you@airline.com" autocomplete="email">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="regPassword" placeholder="Min. 8 characters" autocomplete="new-password">
        </div>
        <div class="form-group">
            <label>Invite Code</label>
            <input type="text" id="regInviteCode" placeholder="e.g. c4f632a7" style="letter-spacing:2px; text-transform:uppercase;">
        </div>
        <button class="btn" id="registerBtn" onclick="handleRegister()">CREATE ACCOUNT →</button>
        <div class="status-msg" id="registerStatus"></div>
    </div>

    <div class="card-footer">
        <a href="https://thesafetylayer.xyz">← Back to The Safety Layer</a>
    </div>
</div>

<div class="powered">
    A project by <a href="https://gsacharya.com"><strong>Ghanshyam Acharya</strong></a>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

// ── CONFIG ────────────────────────────────────────────────
const SUPABASE_URL  = 'https://nrbnhvtomwfmanijtgal.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5yYm5odnRvbXdmbWFuaWp0Z2FsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwOTAxMTQsImV4cCI6MjA4OTY2NjExNH0.QsOVIjDDc_UzT7CqtUedGktrAtVTvXk3HnxKlwtWtDs';
const DASHBOARD_URL = 'https://app.thesafetylayer.xyz';
// ─────────────────────────────────────────────────────────

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON);

// Redirect if already logged in
const { data: { session } } = await supabase.auth.getSession();
if (session) window.location.href = DASHBOARD_URL;

// ── TAB SWITCHING ─────────────────────────────────────────
window.showTab = function(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) =>
        b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'))
    );
    document.getElementById('loginPanel').classList.toggle('active', tab === 'login');
    document.getElementById('registerPanel').classList.toggle('active', tab === 'register');
};

// ── LOGIN ─────────────────────────────────────────────────
window.handleLogin = async function() {
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const btn      = document.getElementById('loginBtn');
    const status   = document.getElementById('loginStatus');

    if (!email || !password) {
        status.className = 'status-msg error';
        status.textContent = '⚠️ Please enter your email and password.';
        return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in...';

    const { error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) {
        status.className = 'status-msg error';
        status.textContent = '❌ ' + error.message;
        btn.disabled = false;
        btn.textContent = 'SIGN IN →';
    } else {
        status.className = 'status-msg success';
        status.textContent = '✅ Signed in! Redirecting to dashboard...';
        setTimeout(() => window.location.href = DASHBOARD_URL, 1000);
    }
};

// ── MAGIC LINK ────────────────────────────────────────────
window.handleMagicLink = async function() {
    const email  = document.getElementById('loginEmail').value.trim();
    const status = document.getElementById('loginStatus');

    if (!email) {
        status.className = 'status-msg error';
        status.textContent = '⚠️ Please enter your email address first.';
        return;
    }

    const { error } = await supabase.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: DASHBOARD_URL }
    });

    if (error) {
        status.className = 'status-msg error';
        status.textContent = '❌ ' + error.message;
    } else {
        status.className = 'status-msg success';
        status.textContent = '✅ Magic link sent! Check your email inbox.';
    }
};

// ── REGISTER ──────────────────────────────────────────────
window.handleRegister = async function() {
    const name       = document.getElementById('regName').value.trim();
    const email      = document.getElementById('regEmail').value.trim();
    const password   = document.getElementById('regPassword').value;
    const inviteCode = document.getElementById('regInviteCode').value.trim().toLowerCase();
    const btn        = document.getElementById('registerBtn');
    const status     = document.getElementById('registerStatus');

    if (!name || !email || !password || !inviteCode) {
        status.className = 'status-msg error';
        status.textContent = '⚠️ Please fill in all fields.';
        return;
    }
    if (password.length < 8) {
        status.className = 'status-msg error';
        status.textContent = '⚠️ Password must be at least 8 characters.';
        return;
    }

    btn.disabled = true;
    btn.textContent = 'Creating account...';

    // Step 1 — Create Supabase Auth user
    const { error: authError } = await supabase.auth.signUp({
        email,
        password,
        options: { emailRedirectTo: DASHBOARD_URL }
    });

    if (authError) {
        status.className = 'status-msg error';
        status.textContent = '❌ ' + authError.message;
        btn.disabled = false;
        btn.textContent = 'CREATE ACCOUNT →';
        return;
    }

    // Step 2 — Sign in immediately so auth.uid() is available for the RPC call
    const { error: signInError } = await supabase.auth.signInWithPassword({ email, password });

    if (signInError) {
        status.className = 'status-msg error';
        status.textContent = '❌ Account created but auto sign-in failed. Please verify your email then sign in manually.';
        btn.disabled = false;
        btn.textContent = 'CREATE ACCOUNT →';
        return;
    }

    // Step 3 — Link to airline via invite code
    const { data: result, error: rpcError } = await supabase
        .rpc('register_with_invite', {
            p_invite_code: inviteCode,
            p_full_name:   name
        });

    if (rpcError || !result?.success) {
        status.className = 'status-msg error';
        status.textContent = '❌ ' + (result?.error || rpcError?.message || 'Invalid invite code.');
        btn.disabled = false;
        btn.textContent = 'CREATE ACCOUNT →';
        return;
    }

    status.className = 'status-msg success';
    status.textContent = `✅ Account created for ${result.airline_name}! Redirecting to dashboard...`;
    btn.textContent = 'ACCOUNT CREATED ✓';

    setTimeout(() => window.location.href = DASHBOARD_URL, 2000);
};

// ── ENTER KEY SUPPORT ─────────────────────────────────────
document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
        const loginActive = document.getElementById('loginPanel').classList.contains('active');
        if (loginActive) handleLogin();
        else handleRegister();
    }
});
</script>
</body>
</html>
